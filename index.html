<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Screen</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="theme-android">
    <!-- Wallpaper layer -->
    <div id="wallpaper"></div>

    <!-- Main container -->
    <div id="app">
      <!-- Icon grid -->
      <div id="grid-container">
        <div id="icon-grid"></div>
      </div>
    </div>

    <!-- Context menu -->
    <div id="context-menu" class="hidden">
      <ul id="context-menu-list" role="menu" aria-label="Actions"></ul>
    </div>

    <!-- Icon edit modal -->
    <div id="modal-overlay" class="hidden">
      <div
        id="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <h2 id="modal-title">Add Icon</h2>

        <label
          >Name
          <input type="text" id="modal-name" placeholder="My App" />
        </label>

        <label
          >URL
          <input type="url" id="modal-url" placeholder="https://example.com" />
        </label>

        <label
          >Icon URL
          <span class="hint">(leave blank to auto-fetch favicon)</span>
          <input
            type="url"
            id="modal-icon"
            placeholder="https://example.com/icon.png"
          />
        </label>

        <div id="modal-icon-preview-row">
          <div id="modal-icon-preview"></div>
          <button type="button" id="modal-fetch-favicon">Fetch favicon</button>
        </div>

        <div id="modal-actions">
          <button type="button" id="modal-cancel">Cancel</button>
          <button type="button" id="modal-delete" class="danger hidden">
            Delete
          </button>
          <button type="button" id="modal-save">Save</button>
        </div>
      </div>
    </div>

    <!-- Settings modal -->
    <div id="settings-overlay" class="hidden">
      <div
        id="settings-modal"
        role="dialog"
        aria-modal="true"
        aria-label="Settings"
      >
        <h2>Settings</h2>

        <section>
          <h3>Appearance</h3>
          <div id="color-mode-toggle-group">
            <button class="color-mode-btn active" data-mode="light">
              Light
            </button>
            <button class="color-mode-btn" data-mode="dark">Dark</button>
          </div>
        </section>

        <section>
          <h3>Grid</h3>
          <div class="setting-row">
            <label
              >Spacing
              <input
                type="number"
                id="settings-columns"
                min="8"
                max="32"
                value="16"
              />
            </label>
          </div>
        </section>

        <section>
          <h3>Data</h3>
          <div id="data-buttons">
            <button type="button" id="settings-export">Export JSON</button>
            <button type="button" id="settings-import-btn">Import JSON</button>
            <input
              type="file"
              id="settings-import-file"
              accept=".json"
              class="hidden"
            />
          </div>
        </section>

        <div id="settings-actions">
          <button type="button" id="settings-close">Close</button>
        </div>
      </div>
    </div>

    <!-- Settings trigger (gear icon) -->
    <button id="settings-btn" title="Settings" aria-label="Settings">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <circle cx="12" cy="12" r="3" />
        <path
          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
        />
      </svg>
    </button>

    <script src="theme.js"></script>
    <script src="icons.js"></script>
    <script src="contextmenu.js"></script>
    <script src="settings.js"></script>
    <script src="app.js"></script>
  </body>
</html>
